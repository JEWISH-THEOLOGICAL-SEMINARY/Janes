<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{{ block "title" . }}{{ .Site.Title }}{{ end }}</title>
        <link rel="stylesheet" href="{{ "css/styles.css" | relURL }}" />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Merriweather:ital,wght@0,300;0,700;1,300&display=swap"
            rel="stylesheet"
        />
        <!-- PDF.js CDN -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    </head>
    <body>
        <header class="site-header" id="site-header">
            <div class="container">
                <h1 class="logo"><a href="{{ .Site.Home.RelPermalink }}">JANES</a></h1>

                <button
                    class="nav-toggle"
                    id="nav-toggle"
                    aria-label="Open navigation"
                    aria-expanded="false"
                    aria-controls="site-nav"
                >
                    <span></span>
                    <span></span>
                    <span></span>
                </button>

                <nav id="site-nav">
                    {{ range .Site.Menus.main }}
                        <a href="{{ .URL | relURL }}">{{ .Name }}</a>
                    {{ end }}
                </nav>
            </div>
        </header>

        {{ block "hero" . }}{{ end }}

        <main class="container content">{{ block "main" . }}{{ end }}</main>

        <footer class="site-footer">
            <div class="container">
                <p>
                    &copy; {{ now.Format "2006" }} {{ .Site.Title }}. All rights
                    reserved.
                </p>
                <p>ISSN: {{ .Site.Params.issn }}</p>
            </div>
        </footer>
        <script>
            (function () {
                var toggle = document.getElementById("nav-toggle");
                var header = document.getElementById("site-header");

                function openNav() {
                    header.classList.add("nav-open");
                    toggle.setAttribute("aria-expanded", "true");
                    toggle.setAttribute("aria-label", "Close navigation");
                }

                function closeNav() {
                    header.classList.remove("nav-open");
                    toggle.setAttribute("aria-expanded", "false");
                    toggle.setAttribute("aria-label", "Open navigation");
                }

                toggle.addEventListener("click", function (e) {
                    e.stopPropagation();
                    header.classList.contains("nav-open")
                        ? closeNav()
                        : openNav();
                });

                // Close when clicking outside the header
                document.addEventListener("click", function (e) {
                    if (!header.contains(e.target)) closeNav();
                });

                // Close on Escape
                document.addEventListener("keydown", function (e) {
                    if (
                        e.key === "Escape" &&
                        header.classList.contains("nav-open")
                    ) {
                        closeNav();
                        toggle.focus();
                    }
          page-container      });

                // Close when a nav link is followed (for single-page feel)
                document
                    .querySelectorAll("#site-nav a")
                    .forEach(function (link) {
                        link.addEventListener("click", closeNav);
                    });
            })();
        </script>
    </body>
</html>
