baseURL = 'https://janes.jtsa.edu/'
title = 'Journal of the Ancient Near Eastern Society'

relativeURLs = false
uglyURLs = false

defaultContentLanguage = 'en'

enableRobotsTXT = true

# Allow raw HTML in Markdown content (used by the Submission Guidelines page for
# the themed callout/instruction-box components). Content here is all
# hand-authored, so this is safe.
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[languages.en]
languageName = 'English'
locale = 'en-US'
weight = 1

[params]
  issn = "0010-2016"
  description = "Journal of the Ancient Near Eastern Society"

[menus]
[[menus.main]]
name = "For Authors"
pageRef = "/for-authors/"
weight = 10

[[menus.main]]
name = "Editorial Board"
pageRef = "/editorial-board/"
weight = 20

[[menus.main]]
name = "About"
pageRef = "/about/"
weight = 30

[[menus.main]]
name = "Volumes"
pageRef = "/volumes/"
weight = 40

[[menus.main]]
name = "Author Index"
pageRef = "/authors/"
weight = 50

[caches]
  [caches.images]
    dir = ':cacheDir/images'
